name: Deploy Python App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r "Gemini Text Cleaner/requirements.txt"

      - name: Test Python files
        run: |
          python -m py_compile "Gemini Text Cleaner/Text_Cleaner_Batch_Process/text_cleaner.py"

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 3136
          script: |
            cd /home/dpd/Sinhala-text-cleaner-for-ASR-Chatbot-for-Caller-center
            git pull origin main
            pip install -r "Gemini Text Cleaner/requirements.txt"
            pkill -f "text_cleaner.py" || true
            nohup python "Gemini Text Cleaner/Text_Cleaner_Batch_Process/text_cleaner.py" > app.log 2>&1 &
