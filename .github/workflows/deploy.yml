name: Deploy FastAPI App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Check SSH connectivity from runner
      run: |
        echo "Checking SSH connectivity to ${{ secrets.HOST }}:3136"
        nc -vz ${{ secrets.HOST }} 3136 || true
        ssh-keyscan -p 3136 ${{ secrets.HOST }} || true

    - name: Runner SSH debug attempt
      env:
        HOST: ${{ secrets.HOST }}
        USERNAME: ${{ secrets.USERNAME }}
        SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        echo "Writing SSH key to /tmp/gha_key"
        mkdir -p /tmp

        echo "$SSH_KEY" > /tmp/gha_key
        chmod 600 /tmp/gha_key

        echo "Attempting SSH connect to $HOST:3136"

        ssh -p 3136 \
          -o StrictHostKeyChecking=no \
          -o BatchMode=yes \
          -o ConnectTimeout=10 \
          -i /tmp/gha_key \
          $USERNAME@$HOST 'echo SSH_OK' || true

        echo "SSH attempt finished"

    - name: Deploy to VM via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: 3136
        script_stop: true
        debug: true
        script: |
          cd ~/Sinhala-text-cleaner-for-ASR-Chatbot-for-Caller-center

          git pull origin main

          docker stop text-cleaner || true
          docker rm text-cleaner || true

          docker build -t text-cleaner .

          docker run -d \
            -p 8000:8000 \
            --env-file .env \
            --name text-cleaner \
            text-cleaner
